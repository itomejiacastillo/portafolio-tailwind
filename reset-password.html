<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Recuperar contraseña - Emmanuel Mejia Castillo</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gray-100 text-gray-900">
  <div class="flex min-h-screen items-center justify-center px-4 py-8">
    <main class="w-full max-w-md rounded-xl bg-white p-6 shadow-2xl">
      <div class="mb-5 text-center">
        <h1 class="text-xl font-bold text-gray-900">Restablecer contraseña</h1>
        <p id="reset-description" class="mt-2 text-sm text-gray-500">Ingresa tu nueva contraseña para actualizar tu cuenta.</p>
      </div>

      <!-- Contenedor del formulario, oculto por defecto hasta validar sesión -->
      <div id="form-container" class="hidden">
        <form id="reset-password-form" class="space-y-4">
          <div class="space-y-1">
            <label class="block text-sm font-medium text-gray-500">Cuenta a recuperar</label>
            <div id="user-email-display" class="w-full rounded-lg bg-gray-100 border border-gray-200 px-3 py-2 text-gray-700 font-medium">
              cargando...
            </div>
          </div>

          <div class="space-y-1">
            <label for="new-password" class="block text-sm font-medium text-gray-700">Nueva contraseña</label>
            <input id="new-password" name="new-password" type="password" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400/60 outline-none transition focus:border-gray-900 focus:ring-2 focus:ring-gray-200" placeholder="••••••••" />
          </div>
          
          <div class="space-y-1">
            <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirmar contraseña</label>
            <input id="confirm-password" name="confirm-password" type="password" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400/60 outline-none transition focus:border-gray-900 focus:ring-2 focus:ring-gray-200" placeholder="••••••••" />
          </div>

          <button id="submit-button" type="submit" class="w-full rounded-lg bg-gray-900 px-4 py-2.5 font-semibold text-white transition hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2">
            Guardar nueva contraseña
          </button>
        </form>
      </div>

      <!-- Mensaje de estado principal (carga o error) -->
      <div id="status-message" class="rounded-lg border p-4 text-sm text-center">
        Validando enlace de recuperación...
      </div>

      <div class="mt-5 text-center">
        <a href="plan-de-estudios.html" class="text-sm font-medium text-gray-500 hover:text-gray-900">Volver al plan de estudios</a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="reset-password.js"></script>
</body>
</html>
